services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # เราตัด depends_on: postgres ออก เพราะไม่ต้องรอ DB ในเครื่องแล้ว
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8585:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

# เราลบ volumes: postgres_data ด้านล่างออกไปด้วยครับ เพราะไม่ได้ใช้แล้ว